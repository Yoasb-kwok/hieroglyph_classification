path: ./dataset  # The main dataset folder
train: images/train  # The folder with your training images
val: images/train    # Use the same folder for validation for now

# Number of classes
nc: 2

# Class names (Make sure these match the order you created them in MakeSense!)
# For example, if '人' was the first label you made, it is index 0.
names: 
  0: de_hieroglyph
  1: ren_hieroglyph
  